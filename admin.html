<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Securitia — Admin</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>"
    />
    <style>
      :root {
        --bg: #0a0e1a;
        --panel: #111827;
        --panel-2: #0f172a;
        --border: #1f2937;
        --text: #e5e7eb;
        --muted: #9ca3af;
        --accent: #6366f1;
        --accent-hover: #4f46e5;
        --success: #10b981;
        --error: #ef4444;
        --warn: #f59e0b;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        font-family: "Inter", system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      button {
        font-family: inherit;
        cursor: pointer;
      }
      .btn-primary {
        background: var(--accent);
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 8px;
        font-weight: 600;
        font-size: 13px;
      }
      .btn-primary:hover {
        background: var(--accent-hover);
      }
      .btn-primary:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .btn-ghost {
        background: transparent;
        color: var(--muted);
        border: 1px solid var(--border);
        padding: 6px 12px;
        border-radius: 8px;
        font-size: 12px;
      }
      .btn-ghost:hover {
        color: var(--text);
        border-color: var(--accent);
      }
      input[type="password"],
      input[type="text"],
      textarea {
        width: 100%;
        padding: 10px 12px;
        background: var(--panel-2);
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--text);
        font-size: 13px;
        font-family: inherit;
        resize: vertical;
      }
      input:focus,
      textarea:focus {
        outline: none;
        border-color: var(--accent);
      }

      /* Login */
      .login-card {
        max-width: 380px;
        margin: 120px auto;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 32px;
      }
      .login-card h2 {
        margin: 0 0 8px;
        font-size: 22px;
      }
      .login-card p {
        margin: 0 0 20px;
        color: var(--muted);
        font-size: 14px;
      }
      .login-card button {
        width: 100%;
        margin-top: 12px;
      }

      /* Editor layout */
      .app {
        display: grid;
        grid-template-columns: 1fr 460px;
        grid-template-rows: 56px 1fr;
        height: 100vh;
      }
      .topbar {
        grid-column: 1 / -1;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px;
        background: var(--panel);
        border-bottom: 1px solid var(--border);
      }
      .topbar__brand {
        display: flex;
        align-items: center;
        gap: 12px;
        font-weight: 800;
        letter-spacing: 0.5px;
      }
      .topbar__actions {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .lang-tabs {
        display: inline-flex;
        border: 1px solid var(--border);
        border-radius: 999px;
        overflow: hidden;
      }
      .lang-tabs button {
        background: transparent;
        border: none;
        color: var(--muted);
        padding: 6px 14px;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.05em;
      }
      .lang-tabs button.is-active {
        background: var(--accent);
        color: white;
      }
      .status {
        font-size: 12px;
        color: var(--muted);
      }
      .status--success {
        color: var(--success);
      }
      .status--error {
        color: var(--error);
      }
      .status--warn {
        color: var(--warn);
      }

      /* Preview */
      .preview {
        position: relative;
        background: #05060b;
        border-right: 1px solid var(--border);
        overflow: hidden;
      }
      .preview iframe {
        width: 100%;
        height: 100%;
        border: 0;
        background: var(--bg);
      }
      .preview__hint {
        position: absolute;
        top: 12px;
        left: 12px;
        background: rgba(99, 102, 241, 0.15);
        border: 1px solid rgba(99, 102, 241, 0.35);
        color: #c7d2fe;
        padding: 6px 10px;
        border-radius: 6px;
        font-size: 11px;
        pointer-events: none;
      }

      /* Side panel */
      .side {
        display: flex;
        flex-direction: column;
        background: var(--panel);
        overflow: hidden;
      }
      .side__header {
        padding: 14px 18px;
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .side__header h2 {
        margin: 0;
        font-size: 14px;
        color: var(--muted);
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }
      .side__search {
        padding: 12px 18px;
        border-bottom: 1px solid var(--border);
      }
      .side__body {
        flex: 1;
        overflow-y: auto;
        padding: 8px 18px 80px;
      }

      .section {
        border-top: 1px solid var(--border);
        padding: 14px 0;
      }
      .section:first-child {
        border-top: none;
      }
      .section__title {
        display: flex;
        justify-content: space-between;
        align-items: center;
        cursor: pointer;
        user-select: none;
      }
      .section__title h3 {
        margin: 0;
        font-size: 13px;
        color: var(--accent);
      }
      .section__title small {
        font-size: 11px;
        color: var(--muted);
        font-family: "SF Mono", Menlo, monospace;
      }
      .section__fields {
        margin-top: 10px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .section.is-collapsed .section__fields {
        display: none;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 4px;
        padding: 8px;
        border-radius: 8px;
        border: 1px solid transparent;
        background: var(--panel-2);
      }
      .field.is-focused {
        border-color: var(--accent);
        box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
      }
      .field.is-dirty {
        border-left: 3px solid var(--warn);
      }
      .field label {
        font-size: 10px;
        color: var(--muted);
        font-family: "SF Mono", Menlo, monospace;
        letter-spacing: 0.03em;
      }

      .hidden {
        display: none !important;
      }

      @media (max-width: 1024px) {
        .app {
          grid-template-columns: 1fr 380px;
        }
      }
      @media (max-width: 800px) {
        .app {
          grid-template-columns: 1fr;
          grid-template-rows: 56px minmax(320px, 40vh) 1fr;
        }
        .preview {
          border-right: none;
          border-bottom: 1px solid var(--border);
        }
      }
    </style>
  </head>
  <body>
    <!-- Login view -->
    <div id="login-view" class="login-card">
      <h2>🛡️ Acceso admin</h2>
      <p>Introduce la contraseña para gestionar los textos del sitio.</p>
      <form id="login-form">
        <input
          type="password"
          id="password-input"
          placeholder="Contraseña"
          autocomplete="current-password"
          required
        />
        <button type="submit" class="btn-primary">Entrar</button>
        <p
          id="login-error"
          class="status status--error"
          style="margin: 12px 0 0"
        ></p>
      </form>
    </div>

    <!-- Editor view -->
    <div id="editor-view" class="app hidden">
      <div class="topbar">
        <div class="topbar__brand">🛡️ SECURITIA · Admin</div>
        <div class="topbar__actions">
          <div class="lang-tabs" id="lang-tabs">
            <button type="button" data-lang="es" class="is-active">ES</button>
            <button type="button" data-lang="en">EN</button>
          </div>
          <span id="save-status" class="status"></span>
          <button id="reload-btn" class="btn-ghost">Recargar</button>
          <button id="save-btn" class="btn-primary">Guardar cambios</button>
          <button id="logout-btn" class="btn-ghost">Salir</button>
        </div>
      </div>

      <div class="preview">
        <iframe id="preview-frame" title="Preview"></iframe>
        <div class="preview__hint">
          Clic en un texto para seleccionarlo · Doble clic para editarlo inline
        </div>
      </div>

      <aside class="side">
        <div class="side__header">
          <h2>Textos</h2>
          <small id="dirty-count" class="status"></small>
        </div>
        <div class="side__search">
          <input
            id="search-input"
            type="text"
            placeholder="Buscar clave o contenido…"
          />
        </div>
        <div class="side__body" id="sections"></div>
      </aside>
    </div>

    <script>
      const SECTIONS = [
        { id: "nav", title: "Navegación", prefix: "nav." },
        { id: "hero", title: "Hero (sección principal)", prefix: "hero." },
        { id: "how", title: "Cómo funciona", prefix: "how." },
        { id: "vulns", title: "Vulnerabilidades", prefix: "vulns." },
        { id: "pricing", title: "Precios", prefix: "pricing." },
        { id: "results", title: "CTA de resultados", prefix: "results." },
        { id: "footer", title: "Footer", prefix: "footer." },
      ];

      const TOKEN_KEY = "securitia_admin_token";

      const loginView = document.getElementById("login-view");
      const editorView = document.getElementById("editor-view");
      const loginForm = document.getElementById("login-form");
      const passwordInput = document.getElementById("password-input");
      const loginError = document.getElementById("login-error");
      const logoutBtn = document.getElementById("logout-btn");
      const saveBtn = document.getElementById("save-btn");
      const reloadBtn = document.getElementById("reload-btn");
      const saveStatus = document.getElementById("save-status");
      const sectionsRoot = document.getElementById("sections");
      const previewFrame = document.getElementById("preview-frame");
      const langTabs = document.getElementById("lang-tabs");
      const searchInput = document.getElementById("search-input");
      const dirtyCount = document.getElementById("dirty-count");

      // State
      let currentLang = "es";
      // Texts loaded from server per language (source of truth for "saved" values).
      const serverTexts = { es: {}, en: {} };
      // Local edits per language (key -> value). Empty = no unsaved edit.
      const localEdits = { es: {}, en: {} };

      function getToken() {
        return sessionStorage.getItem(TOKEN_KEY);
      }
      function setToken(token) {
        if (token) sessionStorage.setItem(TOKEN_KEY, token);
        else sessionStorage.removeItem(TOKEN_KEY);
      }

      function currentValue(key) {
        return key in localEdits[currentLang]
          ? localEdits[currentLang][key]
          : serverTexts[currentLang][key] || "";
      }

      function showEditor() {
        loginView.classList.add("hidden");
        editorView.classList.remove("hidden");
        loadLang(currentLang);
      }

      function showLogin() {
        loginView.classList.remove("hidden");
        editorView.classList.add("hidden");
        passwordInput.value = "";
        passwordInput.focus();
      }

      loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        loginError.textContent = "";
        try {
          const res = await fetch("/api/admin/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ password: passwordInput.value }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || "Error de login");
          setToken(data.token);
          showEditor();
        } catch (err) {
          loginError.textContent = err.message;
        }
      });

      logoutBtn.addEventListener("click", () => {
        setToken(null);
        showLogin();
      });

      async function loadLang(lang) {
        currentLang = lang;
        updateLangTabs();
        saveStatus.textContent = "Cargando…";
        saveStatus.className = "status";
        const res = await fetch(`/api/texts?lang=${lang}`);
        const payload = await res.json();
        serverTexts[lang] = payload.texts || payload;
        renderSections();
        refreshIframe();
        saveStatus.textContent = "";
        updateDirty();
      }

      function updateLangTabs() {
        langTabs.querySelectorAll("button").forEach((b) => {
          b.classList.toggle("is-active", b.dataset.lang === currentLang);
        });
      }

      langTabs.addEventListener("click", (e) => {
        const btn = e.target.closest("button[data-lang]");
        if (!btn) return;
        const lang = btn.dataset.lang;
        if (lang === currentLang) return;
        if (!serverTexts[lang] || !Object.keys(serverTexts[lang]).length) {
          loadLang(lang);
        } else {
          currentLang = lang;
          updateLangTabs();
          renderSections();
          refreshIframe();
          updateDirty();
        }
      });

      function refreshIframe() {
        const src = `/?admin=1&lang=${currentLang}&t=${Date.now()}`;
        previewFrame.src = src;
      }

      function renderSections() {
        sectionsRoot.innerHTML = "";
        const keys = Object.keys(serverTexts[currentLang]).sort();
        const filter = searchInput.value.trim().toLowerCase();

        for (const section of SECTIONS) {
          const sectionKeys = keys.filter((k) => k.startsWith(section.prefix));
          if (sectionKeys.length === 0) continue;

          const filtered = filter
            ? sectionKeys.filter(
                (k) =>
                  k.toLowerCase().includes(filter) ||
                  currentValue(k).toLowerCase().includes(filter),
              )
            : sectionKeys;
          if (filtered.length === 0) continue;

          const sec = document.createElement("div");
          sec.className = "section";
          sec.innerHTML = `
            <div class="section__title">
              <h3>${section.title}</h3>
              <small>${section.prefix}*</small>
            </div>
            <div class="section__fields"></div>
          `;
          const fieldsEl = sec.querySelector(".section__fields");
          sec
            .querySelector(".section__title")
            .addEventListener("click", () =>
              sec.classList.toggle("is-collapsed"),
            );

          for (const key of filtered) {
            const value = currentValue(key);
            const isLong = value.length > 60;
            const field = document.createElement("div");
            field.className = "field";
            field.dataset.key = key;
            if (key in localEdits[currentLang]) field.classList.add("is-dirty");

            field.innerHTML = `
              <label>${key}</label>
              ${
                isLong
                  ? `<textarea data-key="${key}" rows="3"></textarea>`
                  : `<input type="text" data-key="${key}" />`
              }
            `;
            const control = field.querySelector("[data-key]");
            control.value = value;
            control.addEventListener("focus", () => {
              document
                .querySelectorAll(".field.is-focused")
                .forEach((f) => f.classList.remove("is-focused"));
              field.classList.add("is-focused");
              postToIframe({ type: "securitia:focusText", key });
            });
            control.addEventListener("input", () => {
              setLocal(key, control.value);
              postToIframe({
                type: "securitia:setText",
                key,
                value: control.value,
              });
            });

            fieldsEl.appendChild(field);
          }

          sectionsRoot.appendChild(sec);
        }
      }

      function setLocal(key, value) {
        const saved = serverTexts[currentLang][key] || "";
        if (value === saved) {
          delete localEdits[currentLang][key];
        } else {
          localEdits[currentLang][key] = value;
        }
        const field = document.querySelector(`.field[data-key="${key}"]`);
        if (field)
          field.classList.toggle("is-dirty", key in localEdits[currentLang]);
        updateDirty();
      }

      function updateDirty() {
        const total =
          Object.keys(localEdits.es).length + Object.keys(localEdits.en).length;
        if (total === 0) {
          dirtyCount.textContent = "";
          dirtyCount.className = "status";
        } else {
          dirtyCount.textContent = `${total} cambio${total > 1 ? "s" : ""} sin guardar`;
          dirtyCount.className = "status status--warn";
        }
      }

      function postToIframe(msg) {
        if (!previewFrame.contentWindow) return;
        previewFrame.contentWindow.postMessage(msg, "*");
      }

      // Messages from the landing iframe
      window.addEventListener("message", (event) => {
        const msg = event.data;
        if (!msg || typeof msg !== "object") return;

        if (msg.type === "securitia:ready") {
          // Push all current local edits so the iframe reflects unsaved state.
          for (const [key, value] of Object.entries(localEdits[currentLang])) {
            postToIframe({ type: "securitia:setText", key, value });
          }
        } else if (
          msg.type === "securitia:edit" ||
          msg.type === "securitia:input"
        ) {
          if (msg.lang && msg.lang !== currentLang) return;
          const control = document.querySelector(
            `.field[data-key="${msg.key}"] [data-key]`,
          );
          if (control) control.value = msg.value;
          setLocal(msg.key, msg.value);
        } else if (msg.type === "securitia:select") {
          const field = document.querySelector(`.field[data-key="${msg.key}"]`);
          if (!field) return;
          document
            .querySelectorAll(".field.is-focused")
            .forEach((f) => f.classList.remove("is-focused"));
          field.classList.add("is-focused");
          field.scrollIntoView({ behavior: "smooth", block: "center" });
          const control = field.querySelector("[data-key]");
          if (control) control.focus();
        }
      });

      searchInput.addEventListener("input", renderSections);

      saveBtn.addEventListener("click", async () => {
        const langsToSave = ["es", "en"].filter(
          (l) => Object.keys(localEdits[l]).length > 0,
        );
        if (langsToSave.length === 0) {
          saveStatus.textContent = "Nada que guardar";
          saveStatus.className = "status";
          return;
        }

        saveBtn.disabled = true;
        saveStatus.textContent = "Guardando…";
        saveStatus.className = "status";

        try {
          for (const lang of langsToSave) {
            const res = await fetch("/api/admin/texts", {
              method: "PUT",
              headers: {
                "Content-Type": "application/json",
                Authorization: `Bearer ${getToken()}`,
              },
              body: JSON.stringify({ lang, texts: localEdits[lang] }),
            });
            if (res.status === 401) {
              setToken(null);
              showLogin();
              loginError.textContent = "Sesión expirada, vuelve a entrar.";
              return;
            }
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || "Error al guardar");
            serverTexts[lang] = data.texts;
            localEdits[lang] = {};
          }
          renderSections();
          updateDirty();
          saveStatus.textContent = "✅ Cambios guardados";
          saveStatus.className = "status status--success";
        } catch (err) {
          saveStatus.textContent = `❌ ${err.message}`;
          saveStatus.className = "status status--error";
        } finally {
          saveBtn.disabled = false;
        }
      });

      reloadBtn.addEventListener("click", () => {
        const hasDirty =
          Object.keys(localEdits.es).length +
            Object.keys(localEdits.en).length >
          0;
        if (
          hasDirty &&
          !confirm("Tienes cambios sin guardar. ¿Descartarlos?")
        ) {
          return;
        }
        localEdits.es = {};
        localEdits.en = {};
        loadLang(currentLang);
      });

      // Warn before leaving with unsaved edits
      window.addEventListener("beforeunload", (e) => {
        const dirty =
          Object.keys(localEdits.es).length + Object.keys(localEdits.en).length;
        if (dirty > 0) {
          e.preventDefault();
          e.returnValue = "";
        }
      });

      // Boot
      if (getToken()) showEditor();
      else showLogin();
    </script>
  </body>
</html>
